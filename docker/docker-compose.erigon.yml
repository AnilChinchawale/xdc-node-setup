# Erigon client for XDC multi-client setup
# Usage: docker compose -f docker-compose.yml -f docker-compose.erigon.yml up -d

services:
  xdc-erigon:
    image: erigontech/erigon:latest
    platform: linux/amd64
    container_name: xdc-erigon
    restart: always
    ports:
      - "30304:30304"
      - "30304:30304/udp"
      - "127.0.0.1:8555:8555"
      - "127.0.0.1:8556:8556"
      - "127.0.0.1:9090:9090"
      - "127.0.0.1:6060:6060"
    volumes:
      - ../${NETWORK:-mainnet}/erigon:/home/erigon/.local/share/erigon
      - ./${NETWORK:-mainnet}/bootnodes.list:/work/bootnodes.list:ro
      - ./erigon-entrypoint.sh:/entrypoint.sh:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - NETWORK_ID=${NETWORK_ID:-50}
      - BOOTNODES_FILE=/work/bootnodes.list
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8555 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

networks:
  xdc-network:
    external: true
    name: docker_xdc-network
