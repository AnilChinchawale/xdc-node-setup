version: '3.8'

# Apothem Testnet Multi-Client Docker Compose
# Geth (XDC) + Erigon + Nethermind

services:
  # ==================== GETH APOTHEM ====================
  xdc-node-apothem:
    image: xinfinorg/xdposchain:v2.6.8
    container_name: xdc-node-apothem
    restart: unless-stopped
    ports:
      - "8545:8545"      # HTTP RPC
      - "8546:8546"      # WebSocket  
      - "30303:30303"    # P2P TCP
      - "30303:30303/udp"  # P2P UDP
    volumes:
      - xdc-apothem-data:/work/xdcchain
      - ./apothem/genesis.json:/work/genesis.json:ro
      - ./apothem/bootnodes.list:/work/bootnodes.list:ro
    environment:
      - NETWORK=apothem
    command: >
      --datadir /work/xdcchain
      --networkid 51
      --port 30303
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.vhosts "*"
      --http.corsdomain "*"
      --http.api eth,net,web3,txpool,debug,admin
      --ws
      --ws.addr 0.0.0.0
      --ws.port 8546
      --ws.origins "*"
      --syncmode full
      --bootnodes $(cat /work/bootnodes.list | tr '\n' ',')
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==================== ERIGON APOTHEM ====================
  xdc-node-erigon-apothem:
    build:
      context: https://github.com/AnilChinchawale/erigon-xdc.git#build/xdc-testnet
      dockerfile: Dockerfile
    container_name: xdc-node-erigon-apothem
    restart: unless-stopped
    ports:
      - "8556:8556"      # HTTP RPC (changed from 8555 to avoid conflicts)
      - "8557:8557"      # WebSocket
      - "30306:30306"    # P2P TCP
      - "30306:30306/udp"  # P2P UDP
      - "9090:9090"      # Private API
      - "6060:6060"      # Metrics
    volumes:
      - xdc-erigon-apothem-data:/data/erigon
    environment:
      - NETWORK=apothem
    command: >
      --datadir=/data/erigon
      --chain=apothem
      --networkid=51
      --port=30306
      --http
      --http.addr=0.0.0.0
      --http.port=8556
      --http.vhosts="*"
      --http.corsdomain="*"
      --http.api=eth,net,web3,txpool,debug,erigon
      --ws
      --metrics
      --metrics.addr=0.0.0.0
      --metrics.port=6060
      --trustedpeers=enode://91e59fa1b034ae35e9f4e8a99cc6621f09d74e76a6220abb6c93b29ed41a9e1fc4e5b70e2c5fc43f883cffbdcd6f4f6cbc1d23af077f28c2aecc22403355d4b1@xdc-node-apothem:30303
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8556 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ==================== NETHERMIND APOTHEM ====================
  xdc-node-nethermind-apothem:
    build:
      context: https://github.com/AnilChinchawale/nethermind.git#build/xdc-net9-stable
      dockerfile: Dockerfile
    container_name: xdc-node-nethermind-apothem
    restart: unless-stopped
    ports:
      - "8558:8558"      # HTTP RPC
      - "8559:8559"      # WebSocket
      - "30308:30308"    # P2P TCP
      - "30308:30308/udp"  # P2P UDP
    volumes:
      - xdc-nethermind-apothem-data:/nethermind/data
      - ./nethermind/xdc-apothem-chainspec.json:/nethermind/configs/xdc-apothem-chainspec.json:ro
      - ./nethermind/start-nethermind.sh:/start.sh:ro
    environment:
      - NETHERMIND_CONFIG=xdc-apothem
      - NETHERMIND_NETWORK__BOOTNODES=enode://91e59fa1b034ae35e9f4e8a99cc6621f09d74e76a6220abb6c93b29ed41a9e1fc4e5b70e2c5fc43f883cffbdcd6f4f6cbc1d23af077f28c2aecc22403355d4b1@xdc-node-apothem:30303
    command: >
      --datadir=/nethermind/data
      --config=/nethermind/configs/xdc-apothem.cfg
      --Network.DiscoveryPort=30308
      --Network.P2PPort=30308
      --JsonRpc.Enabled=true
      --JsonRpc.Host=0.0.0.0
      --JsonRpc.Port=8558
      --JsonRpc.WebSocketsPort=8559
      --Sync.FastSync=false
      --Sync.SnapSync=false
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8558 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # ==================== SKYNET AGENTS ====================
  skynet-agent-geth:
    image: alpine/curl:latest
    container_name: skynet-agent-geth
    restart: unless-stopped
    environment:
      - RPC_URL=http://xdc-node-apothem:8545
      - SKYNET_NODE_NAME=gcx-apothem-geth
      - SKYNET_API_URL=https://net.xdc.network/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - AGENT_PORT=7070
    ports:
      - "7070:7070"
    volumes:
      - ./dashboard/combined-start.sh:/start.sh:ro
    command: /bin/sh -c "apk add --no-cache jq bash && exec bash /start.sh"
    networks:
      - xdc-network
    depends_on:
      xdc-node-apothem:
        condition: service_healthy

  skynet-agent-erigon:
    image: alpine/curl:latest
    container_name: skynet-agent-erigon
    restart: unless-stopped
    environment:
      - RPC_URL=http://xdc-node-erigon-apothem:8556
      - SKYNET_NODE_NAME=gcx-apothem-erigon
      - SKYNET_API_URL=https://net.xdc.network/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - AGENT_PORT=7071
    ports:
      - "7071:7071"
    volumes:
      - ./dashboard/combined-start.sh:/start.sh:ro
    command: /bin/sh -c "apk add --no-cache jq bash && exec bash /start.sh"
    networks:
      - xdc-network
    depends_on:
      xdc-node-erigon-apothem:
        condition: service_healthy

  skynet-agent-nethermind:
    image: alpine/curl:latest
    container_name: skynet-agent-nethermind
    restart: unless-stopped
    environment:
      - RPC_URL=http://xdc-node-nethermind-apothem:8558
      - SKYNET_NODE_NAME=gcx-apothem-nethermind
      - SKYNET_API_URL=https://net.xdc.network/api/v1
      - SKYNET_MASTER_KEY=xdc-netown-key-2026-prod
      - AGENT_PORT=7072
    ports:
      - "7072:7072"
    volumes:
      - ./dashboard/combined-start.sh:/start.sh:ro
    command: /bin/sh -c "apk add --no-cache jq bash && exec bash /start.sh"
    networks:
      - xdc-network
    depends_on:
      xdc-node-nethermind-apothem:
        condition: service_healthy

volumes:
  xdc-apothem-data:
    driver: local
  xdc-erigon-apothem-data:
    driver: local
  xdc-nethermind-apothem-data:
    driver: local

networks:
  xdc-network:
    driver: bridge
    name: docker_xdc-network
