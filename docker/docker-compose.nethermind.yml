#==============================================================================
# XDC Node Docker Compose — Nethermind Client Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.nethermind.yml up -d
# Or simply: xdc start --client nethermind
#==============================================================================

services:
  xdc-node:
    build:
      context: ./nethermind
      dockerfile: Dockerfile
    container_name: xdc-node-nethermind
    restart: always
    ports:
      - "${NETHERMIND_P2P_PORT:-30306}:30303"              # P2P port
      - "${NETHERMIND_P2P_PORT:-30306}:30303/udp"
      - "127.0.0.1:${NETHERMIND_RPC_PORT:-8556}:8545"      # HTTP-RPC
    volumes:
      - ../${NETWORK:-mainnet}/nethermind-db:/nethermind/data
      - ./nethermind/start-nethermind.sh:/start.sh:ro
      - ../${NETWORK:-mainnet}/.xdc-node/nethermind.json:/nethermind/configs/xdc.json:ro
      - ./${NETWORK:-mainnet}/genesis.json:/nethermind/chainspec/xdc.json:ro
      - ./mainnet/bootnodes.list:/nethermind/bootnodes.list:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NETWORK=${NETWORK:-mainnet}
      - SYNC_MODE=${SYNC_MODE:-full}
      - RPC_PORT=8545
      - INSTANCE_NAME=${INSTANCE_NAME:-Nethermind_XDC_Node}
      - P2P_PORT=30303
      - NETHERMIND_JSONRPCCONFIG_ENABLEDMODULES=eth,net,web3,admin,debug,trace,txpool
    entrypoint: ["/bin/bash", "/start.sh"]
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545 --post-data='{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header='Content-Type: application/json' | grep -q 'result' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 12G
        reservations:
          cpus: '2'
          memory: 6G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # Update agent to use nethermind's RPC port and dashboard port
  xdc-agent:
    container_name: xdc-agent-nethermind
    ports:
      - "127.0.0.1:${NETHERMIND_DASHBOARD_PORT:-7072}:3000"
    environment:
      - RPC_URL=${RPC_URL:-http://xdc-node:8545}
      - NODE_RPC_PORT=${NETHERMIND_RPC_PORT:-8556}
      - INSTANCE_NAME=${INSTANCE_NAME:-Nethermind_XDC_Node}
      # Dashboard authentication (disabled by default for localhost-only access)
      - DASHBOARD_AUTH_ENABLED=${DASHBOARD_AUTH_ENABLED:-false}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-xdc-skyone}

networks:
  xdc-network:
    driver: bridge
