version: '3.8'

# Apothem Testnet - Nethermind Node
# ChainId: 51

services:
  xdc-node-nethermind-apothem:
    image: anilchinchawale/nmx:latest
    platform: linux/amd64
    container_name: xdc-node-nethermind-apothem
    restart: unless-stopped
    ports:
      - "8558:8558"      # HTTP RPC
      - "30308:30308"    # P2P TCP
      - "30308:30308/udp"  # P2P UDP
    volumes:
      - xdc-nethermind-apothem-data:/nethermind/data
      - ./nethermind/xdc-apothem-chainspec.json:/nethermind/chainspec/xdc-apothem.json:ro
      - ./nethermind/xdc-apothem.cfg:/nethermind/configs/xdc-apothem.cfg:ro
    environment:
      - NETHERMIND_CONFIG=xdc-apothem
    command: >
      --datadir=/nethermind/data
      --config=xdc-apothem
      --Init.ChainSpecPath=/nethermind/chainspec/xdc-apothem.json
      --Init.GenesisHash=0xbdea512b4f12ff1135ec92c00dc047ffb93890c2ea1aa0eefe9b013d80640075
      --Network.DiscoveryPort=30308
      --Network.P2PPort=30308
      --Network.Bootnodes=enode://ee1e11e3f56b015b2b391eb9c45292159713583b4adfe29d24675238f73d33e6ec0a62397847823e2bca622c91892075c517fc383c9355d43a89bb7532e834a0@157.173.120.219:30312,enode://729d763db071595bacbbf33037a8e7639d8e9a97bfcfcda3afe963435d919cb95634f27375f0aadf6494dad47e506c888bf15cb5633d5f81dbb793b05b27e676@207.90.192.100:30312,enode://49c7586c221250cac7070df41c1b6c77180c5d9051e20d1d2b77dfa0dc80b8dc48a8e3c7ca068ac757429223530d6445a06a32ab4af20819cfaa1d47282a0401@80.243.180.121:30312,enode://946cc4d00c4f3e9ffb50fda9d351672d8deaf546e3406228587f8e7131e3c1ad1a0f5ca2d0e2172463a04d747b3e7b29167d93684195952734f4535e7da58351@209.209.10.19:30312,enode://83a51d04ca4056d3630bc2f4e3028de4d041ab346fa5f7ca5bacfb88f4f30b6a055ec34e6350685103abf21cbfed2e79afa229df734909b659c81efc81d3df1c@38.143.58.153:30312
      --JsonRpc.Enabled=true
      --JsonRpc.Host=0.0.0.0
      --JsonRpc.Port=8558
      --Sync.FastSync=false
      --Sync.SnapSync=false
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8558 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

volumes:
  xdc-nethermind-apothem-data:
    driver: local

networks:
  xdc-network:
    external: true
    name: docker_xdc-network
