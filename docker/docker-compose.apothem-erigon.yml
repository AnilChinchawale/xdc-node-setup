# Apothem Testnet - Erigon Node
# ChainId: 51 - Uses real Apothem bootnodes + local Geth as bridge peer
# Erigon only speaks eth/68 on main sentry; peers via eth/63 on port 30304
# Local Geth bridges eth/62+63+100 <-> eth/63 for Erigon

services:
  xdc-node-erigon-apothem:
    image: anilchinchawale/erix:latest
    platform: linux/amd64
    container_name: xdc-node-erigon-apothem
    restart: unless-stopped
    ports:
      - "127.0.0.1:8556:8545"
      - "30306:30306"
      - "30306:30306/udp"
    volumes:
      - xdc-erigon-apothem-data:/data/erigon
    command: >
      --datadir=/data/erigon
      --chain=xdc-apothem
      --networkid=51
      --port=30306
      --http
      --http.addr=0.0.0.0
      --http.port=8545
      --http.vhosts=*
      --http.corsdomain=*
      --http.api=eth,net,web3,txpool,debug,erigon,admin
      --ws
      --staticpeers=enode://ee1e11e3f56b015b2b391eb9c45292159713583b4adfe29d24675238f73d33e6ec0a62397847823e2bca622c91892075c517fc383c9355d43a89bb7532e834a0@157.173.120.219:30312,enode://729d763db071595bacbbf33037a8e7639d8e9a97bfcfcda3afe963435d919cb95634f27375f0aadf6494dad47e506c888bf15cb5633d5f81dbb793b05b27e676@207.90.192.100:30312,enode://49c7586c221250cac7070df41c1b6c77180c5d9051e20d1d2b77dfa0dc80b8dc48a8e3c7ca068ac757429223530d6445a06a32ab4af20819cfaa1d47282a0401@80.243.180.121:30312
    networks:
      - xdc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8545 -X POST -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

volumes:
  xdc-erigon-apothem-data:
    driver: local

networks:
  xdc-network:
    external: true
    name: docker_xdc-network
