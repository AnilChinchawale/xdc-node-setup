global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'xdc-node'
    hostname: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # Uncomment and configure if using Alertmanager
      # - targets: ['alertmanager:9093']

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  - job_name: 'xdc-node'
    static_configs:
      - targets: ['xdc-node:6060']
    metrics_path: /debug/metrics/prometheus
    scrape_interval: 15s

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s
