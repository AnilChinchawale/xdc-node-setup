# XDC Node Configuration File (TOML format)
# Place this file at /opt/xdc-node/config.toml
# SECURITY NOTES:
# - Issues #92, #93 fixed: RPC now binds to localhost by default
# - Change to 0.0.0.0 ONLY if you have firewall/nginx in front

#==============================================================================
# Network Configuration
#==============================================================================
[network]
name = "mainnet"          # mainnet, testnet, devnet, or apothem
instance_name = "xdc-node"

#==============================================================================
# Node Type
#==============================================================================
[node]
type = "full"             # full, archive, masternode
sync_mode = "full"        # full or fast
gc_mode = "full"          # full or archive

#==============================================================================
# P2P Network
#==============================================================================
[p2p]
port = 30303
nat = "any"

#==============================================================================
# RPC Configuration
#==============================================================================
[rpc]
enabled = true
# SECURITY FIX (#93): Changed from 0.0.0.0 to 127.0.0.1
# Only change to 0.0.0.0 if you have proper firewall/nginx in front
addr = "127.0.0.1"
port = 8545
api = ["admin", "eth", "net", "web3", "XDPoS"]
# SECURITY FIX (#92): Changed from "*" to localhost-only
# Add your specific domains if needed for web dashboard access
cors_domain = "http://localhost:3000,http://localhost:7070"
vhosts = "localhost,127.0.0.1"

#==============================================================================
# WebSocket Configuration
#==============================================================================
[websocket]
enabled = true
# SECURITY FIX (#93): Changed from 0.0.0.0 to 127.0.0.1
addr = "127.0.0.1"
port = 8546
api = ["eth", "net", "web3", "XDPoS"]
# SECURITY FIX (#92): Changed from "*" to localhost-only
origins = "http://localhost:3000,http://localhost:7070"

#==============================================================================
# Metrics
#==============================================================================
[metrics]
enabled = true
# SECURITY FIX (#93): Changed from 0.0.0.0 to 127.0.0.1
addr = "127.0.0.1"
port = 6060

#==============================================================================
# Logging
#==============================================================================
[log]
level = 2                 # 0=silent, 1=error, 2=warn, 3=info, 4=debug

#==============================================================================
# Data Directories
# Network-aware structure: <project_dir>/<network>/xdcchain and .xdc-node
# Change "mainnet" below to match the active network (testnet, devnet, etc.)
#==============================================================================
[paths]
data_dir = "/opt/xdc-node/mainnet/xdcchain"
config_dir = "/opt/xdc-node/mainnet/.xdc-node"

#==============================================================================
# SkyNet Registration (optional)
#==============================================================================
[skynet]
enabled = true
api_url = "https://net.xdc.network/api/v1"
# email = "your@email.com"
# telegram = "@username"

#==============================================================================
# Monitoring (optional - requires --profile monitoring)
#==============================================================================
[monitoring]
prometheus_enabled = false
grafana_enabled = false
