services:
  xdc-dashboard:
    build: .
    ports:
      - "8888:3000"
    environment:
      - PROMETHEUS_URL=http://host.docker.internal:19090
      - RPC_URL=http://host.docker.internal:38545
      - NEXT_PUBLIC_REFRESH_INTERVAL=30
      - GEO_CACHE_TTL=300000
    networks:
      - xdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  xdc-network:
    driver: bridge
