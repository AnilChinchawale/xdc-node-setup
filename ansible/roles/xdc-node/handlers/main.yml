---
# XDC Node Role - Handlers

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes
  
- name: Restart XDC node
  ansible.builtin.systemd:
    name: xdc-node
    state: restarted
    daemon_reload: yes
  
- name: Stop XDC node
  ansible.builtin.systemd:
    name: xdc-node
    state: stopped
  
- name: Start XDC node
  ansible.builtin.systemd:
    name: xdc-node
    state: started
