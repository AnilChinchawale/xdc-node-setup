---
# XDC Security Role - Handlers

- name: Restart SSH
  ansible.builtin.systemd:
    name: sshd
    state: restarted
    daemon_reload: yes

- name: Reload SSH
  ansible.builtin.systemd:
    name: sshd
    state: reloaded

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
    daemon_reload: yes

- name: Restart auditd
  ansible.builtin.systemd:
    name: auditd
    state: restarted
    daemon_reload: yes

- name: Reload auditd
  ansible.builtin.command:
    cmd: auditctl -R /etc/audit/rules.d/xdc-node.rules
  changed_when: true

- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true

- name: Reload UFW
  community.general.ufw:
    state: reloaded
