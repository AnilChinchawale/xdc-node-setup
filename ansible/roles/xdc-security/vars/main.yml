---
# XDC Security Role - Internal Variables

# SSH Algorithms
ssh_kex_algorithms:
  - curve25519-sha256@libssh.org
  - diffie-hellman-group-exchange-sha256

ssh_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com
  - aes256-ctr

ssh_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com
  - hmac-sha2-512
  - hmac-sha2-256

ssh_host_key_algorithms:
  - ssh-ed25519
  - rsa-sha2-512
  - rsa-sha2-256

# UFW Rules
ufw_rules:
  - { port: '{{ ssh_port }}', proto: 'tcp', direction: 'in', comment: 'SSH' }
  - { port: '{{ p2p_port | default(30303) }}', proto: 'tcp', direction: 'in', comment: 'XDC P2P TCP' }
  - { port: '{{ p2p_port | default(30303) }}', proto: 'udp', direction: 'in', comment: 'XDC P2P UDP' }

# Internal monitoring ports (localhost only)
ufw_internal_rules:
  - { port: '9090', proto: 'tcp', comment: 'Prometheus' }
  - { port: '3000', proto: 'tcp', comment: 'Grafana' }
  - { port: '9100', proto: 'tcp', comment: 'Node Exporter' }

# Sysctl Security Settings
security_sysctl_settings:
  # Network security
  - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
  - { name: 'net.ipv4.conf.default.accept_redirects', value: '0' }
  - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
  - { name: 'net.ipv4.conf.default.send_redirects', value: '0' }
  - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
  - { name: 'net.ipv4.conf.default.accept_source_route', value: '0' }
  - { name: 'net.ipv4.conf.all.log_martians', value: '1' }
  - { name: 'net.ipv4.conf.default.log_martians', value: '1' }
  - { name: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
  - { name: 'net.ipv4.icmp_ignore_bogus_error_responses', value: '1' }
  - { name: 'net.ipv4.tcp_syncookies', value: '1' }
  - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
  - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
  # IPv6 security
  - { name: 'net.ipv6.conf.all.accept_redirects', value: '0' }
  - { name: 'net.ipv6.conf.default.accept_redirects', value: '0' }
  - { name: 'net.ipv6.conf.all.accept_source_route', value: '0' }
  # Kernel security
  - { name: 'kernel.randomize_va_space', value: '2' }
  - { name: 'kernel.kptr_restrict', value: '2' }
  - { name: 'kernel.dmesg_restrict', value: '1' }
  # File system
  - { name: 'fs.protected_hardlinks', value: '1' }
  - { name: 'fs.protected_symlinks', value: '1' }
  - { name: 'fs.suid_dumpable', value: '0' }

# Packages to remove
packages_to_remove:
  - telnet
  - rsh-client
  - rsh-redone-client
  - talk
  - talkd
  - inetutils-telnet

# Services to disable
services_to_disable:
  - cups
  - avahi-daemon
  - bluetooth
  - ModemManager
