---
# XDC Common Role - Handlers

- name: Restart timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: restarted
    daemon_reload: yes
  
- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true
  
- name: Update grub
  ansible.builtin.command:
    cmd: update-grub
  changed_when: true
