---
# Rolling Update Playbook - Updates XDC clients with zero-downtime strategy
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/update-client.yml
#
# This playbook performs a rolling update across all nodes,
# processing one node at a time with health checks after each.

- name: Rolling Update XDC Clients
  hosts: xdc_nodes
  serial: 1
  become: yes
  gather_facts: yes
  
  vars:
    update_pause_seconds: 60
    health_check_timeout: 300
    health_check_interval: 10
    
  pre_tasks:
    - name: Display update plan
      ansible.builtin.debug:
        msg: |
          ============================================
          Rolling Update Plan
          ============================================
          Target Version: {{ target_version | default('latest') }}
          Total Nodes: {{ ansible_play_hosts | length }}
          Serial Count: 1 (one at a time)
          Pause Between: {{ update_pause_seconds }}s
          ============================================
          
    - name: Confirm update
      ansible.builtin.pause:
        prompt: "Press ENTER to continue with the rolling update or Ctrl+C to abort"
      when: not skip_confirm | default(false) | bool
      
    - name: Create maintenance window marker
      ansible.builtin.file:
        path: /var/run/xdc-maintenance
        state: touch
        mode: '0644'
      
    - name: Send maintenance notification
      ansible.builtin.uri:
        url: "{{ notification_webhook_url | default('') }}"
        method: POST
        body_format: json
        body:
          message: "Starting maintenance on {{ inventory_hostname }}"
          severity: info
          timestamp: "{{ ansible_date_time.iso8601 }}"
      when: notification_webhook_url is defined and notification_webhook_url | length > 0
      ignore_errors: yes
      
    - name: Capture pre-update metrics
      ansible.builtin.uri:
        url: "http://localhost:{{ rpc_port }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: eth_blockNumber
          params: []
          id: 1
        return_content: yes
      register: pre_update_block
      ignore_errors: yes
      
    - name: Save pre-update state
      ansible.builtin.copy:
        content: |
          pre_update_block={{ pre_update_block.json.result | default('unknown') }}
          pre_update_time={{ ansible_date_time.iso8601 }}
          client_version={{ target_version | default('latest') }}
        dest: /var/run/xdc-update-state
        mode: '0644'
      
  roles:
    - role: ../roles/xdc-node
      vars:
        xdc_client_version: "{{ target_version | default('master') }}"
        force_rebuild: true
      tags: [update]
      
  tasks:
    - name: Wait for node to restart
      ansible.builtin.wait_for:
        port: "{{ rpc_port }}"
        timeout: 120
        state: started
      
    - name: Health check - RPC responding
      ansible.builtin.uri:
        url: "http://localhost:{{ rpc_port }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: web3_clientVersion
          params: []
          id: 1
        return_content: yes
      register: health_check
      retries: "{{ health_check_timeout // health_check_interval }}"
      delay: "{{ health_check_interval }}"
      until: health_check.status == 200
      
    - name: Verify client version
      ansible.builtin.assert:
        that:
          - target_version | default('') == '' or target_version in health_check.json.result
        fail_msg: "Client version mismatch. Expected: {{ target_version }}, Got: {{ health_check.json.result }}"
        success_msg: "Client version verified: {{ health_check.json.result }}"
      when: target_version is defined and target_version | length > 0
      
    - name: Check sync status
      ansible.builtin.uri:
        url: "http://localhost:{{ rpc_port }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: eth_syncing
          params: []
          id: 1
        return_content: yes
      register: sync_check
      until: sync_check.json.result == false or (sync_check.json.result.currentBlock | default(0) | int) > 0
      retries: 30
      delay: 10
      
    - name: Verify block progression
      ansible.builtin.uri:
        url: "http://localhost:{{ rpc_port }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: eth_blockNumber
          params: []
          id: 1
        return_content: yes
      register: post_update_block
      
    - name: Compare block heights
      ansible.builtin.debug:
        msg: |
          Block height comparison:
          Pre-update: {{ pre_update_block.json.result | default('N/A') }}
          Post-update: {{ post_update_block.json.result | default('N/A') }}
      
    - name: Verify peer connections
      ansible.builtin.uri:
        url: "http://localhost:{{ rpc_port }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: net_peerCount
          params: []
          id: 1
        return_content: yes
      register: peer_check
      
    - name: Check peer count
      ansible.builtin.assert:
        that:
          - peer_check.json.result | int(base=16) > 0
        fail_msg: "No peers connected after update"
        success_msg: "Connected to {{ peer_check.json.result | int(base=16) }} peers"
      
    - name: Send success notification
      ansible.builtin.uri:
        url: "{{ notification_webhook_url | default('') }}"
        method: POST
        body_format: json
        body:
          message: "Update successful on {{ inventory_hostname }}"
          severity: success
          client_version: "{{ health_check.json.result }}"
          peers: "{{ peer_check.json.result | int(base=16) }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
      when: notification_webhook_url is defined and notification_webhook_url | length > 0
      ignore_errors: yes
      
    - name: Remove maintenance marker
      ansible.builtin.file:
        path: /var/run/xdc-maintenance
        state: absent
        
    - name: Pause before next node
      ansible.builtin.pause:
        seconds: "{{ update_pause_seconds }}"
        prompt: "Waiting {{ update_pause_seconds }} seconds before proceeding to next node..."
      when: not ansible_check_mode
      
  post_tasks:
    - name: Update state tracking
      ansible.builtin.copy:
        content: |
          last_update={{ ansible_date_time.iso8601 }}
          client_version={{ health_check.json.result | default('unknown') }}
          status=success
        dest: /var/lib/xdc-node/update-state
        mode: '0644'
      
    - name: Log update completion
      ansible.builtin.lineinfile:
        path: /var/log/xdc-updates.log
        line: "{{ ansible_date_time.iso8601 }} - Updated to {{ health_check.json.result | default('unknown') }} - SUCCESS"
        create: yes
        mode: '0644'
      
  handlers:
    - name: Restart XDC node
      ansible.builtin.systemd:
        name: xdc-node
        state: restarted
        daemon_reload: yes
