---
# Backup and Restore Playbook - Manages XDC node backups
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/backup-restore.yml --tags backup
#   ansible-playbook -i inventory/hosts.yml playbooks/backup-restore.yml --tags restore -e "restore_file=/backup/xdc-backup-20240101.tar.gz"

- name: XDC Node Backup and Restore
  hosts: xdc_nodes
  become: yes
  gather_facts: yes
  
  vars:
    backup_dir: "{{ backup_dir | default('/backup/xdc-node') }}"
    backup_retention_days: "{{ backup_retention_days | default(30) }}"
    backup_encryption_key: "{{ vault_backup_encryption_key | default('') }}"
    backup_s3_bucket: "{{ backup_s3_bucket | default('') }}"
    backup_s3_region: "{{ backup_s3_region | default('us-east-1') }}"
    
  tasks:
    # ========================================================================
    # Backup Tasks
    # ========================================================================
    - name: Backup Tasks
      tags: [backup, never]
      block:
        - name: Create backup directory
          ansible.builtin.file:
            path: "{{ backup_dir }}/{{ inventory_hostname }}"
            state: directory
            mode: '0750'
            
        - name: Generate backup filename
          ansible.builtin.set_fact:
            backup_filename: "xdc-backup-{{ inventory_hostname }}-{{ ansible_date_time.date }}-{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.tar.gz"
            
        - name: Create pre-backup marker
          ansible.builtin.file:
            path: "{{ xdc_data_dir | default('/root/XDC-Node') }}/.backup-in-progress"
            state: touch
            mode: '0644'
            
        - name: Pause node for consistent backup (optional)
          ansible.builtin.systemd:
            name: xdc-node
            state: stopped
          when: pause_for_backup | default(false) | bool
          
        - name: Create backup archive
          ansible.builtin.command:
            cmd: >
              tar czf {{ backup_dir }}/{{ inventory_hostname }}/{{ backup_filename }}
              --exclude='*.log'
              --exclude='LOCK'
              --exclude='CURRENT'
              --exclude='LOG'
              --exclude='MANIFEST*'
              -C {{ xdc_data_dir | default('/root/XDC-Node') | dirname }}
              {{ xdc_data_dir | default('/root/XDC-Node') | basename }}
          register: backup_result
          changed_when: backup_result.rc == 0
          
        - name: Resume node after backup
          ansible.builtin.systemd:
            name: xdc-node
            state: started
          when: pause_for_backup | default(false) | bool
          
        - name: Encrypt backup (if key provided)
          ansible.builtin.command:
            cmd: >
              gpg --symmetric --cipher-algo AES256 
              --output {{ backup_dir }}/{{ inventory_hostname }}/{{ backup_filename }}.gpg
              --passphrase {{ backup_encryption_key }}
              --batch --yes
              {{ backup_dir }}/{{ inventory_hostname }}/{{ backup_filename }}
          when: backup_encryption_key | length > 0
          no_log: yes
          
        - name: Remove unencrypted backup
          ansible.builtin.file:
            path: "{{ backup_dir }}/{{ inventory_hostname }}/{{ backup_filename }}"
            state: absent
          when: backup_encryption_key | length > 0
          
        - name: Upload to S3 (if configured)
          ansible.builtin.command:
            cmd: >
              aws s3 cp {{ backup_dir }}/{{ inventory_hostname }}/{{ backup_filename }}{{ '.gpg' if backup_encryption_key | length > 0 else '' }}
              s3://{{ backup_s3_bucket }}/xdc-backups/{{ inventory_hostname }}/
          when: backup_s3_bucket | length > 0
          environment:
            AWS_DEFAULT_REGION: "{{ backup_s3_region }}"
          
        - name: Clean up old backups
          ansible.builtin.shell:
            cmd: >
              find {{ backup_dir }}/{{ inventory_hostname }} -name "xdc-backup-*.tar.gz*"
              -mtime +{{ backup_retention_days }} -delete
          
        - name: Remove backup marker
          ansible.builtin.file:
            path: "{{ xdc_data_dir | default('/root/XDC-Node') }}/.backup-in-progress"
            state: absent
            
        - name: Display backup result
          ansible.builtin.debug:
            msg: |
              Backup completed successfully:
              File: {{ backup_filename }}{{ '.gpg' if backup_encryption_key | length > 0 else '' }}
              Location: {{ backup_dir }}/{{ inventory_hostname }}/
              {% if backup_s3_bucket | length > 0 %}
              S3: s3://{{ backup_s3_bucket }}/xdc-backups/{{ inventory_hostname }}/
              {% endif %}
              
    # ========================================================================
    # Restore Tasks
    # ========================================================================
    - name: Restore Tasks
      tags: [restore, never]
      block:
        - name: Validate restore file
          ansible.builtin.stat:
            path: "{{ restore_file }}"
          register: restore_file_stat
          
        - name: Fail if restore file not found
          ansible.builtin.fail:
            msg: "Restore file not found: {{ restore_file }}"
          when: not restore_file_stat.stat.exists
          
        - name: Confirm restore
          ansible.builtin.pause:
            prompt: |
              WARNING: This will OVERWRITE existing data on {{ inventory_hostname }}!
              Restore file: {{ restore_file }}
              Press ENTER to continue or Ctrl+C to abort
          when: not force_restore | default(false) | bool
          
        - name: Stop XDC node
          ansible.builtin.systemd:
            name: xdc-node
            state: stopped
            
        - name: Decrypt backup (if encrypted)
          ansible.builtin.command:
            cmd: >
              gpg --decrypt 
              --output {{ backup_dir }}/restore-temp.tar.gz
              --passphrase {{ backup_encryption_key }}
              --batch --yes
              {{ restore_file }}
          when: 
            - restore_file.endswith('.gpg')
            - backup_encryption_key | length > 0
          no_log: yes
          
        - name: Set restore archive path
          ansible.builtin.set_fact:
            restore_archive: "{{ backup_dir }}/restore-temp.tar.gz if restore_file.endswith('.gpg') and backup_encryption_key | length > 0 else restore_file }}"
            
        - name: Backup current data (safety)
          ansible.builtin.command:
            cmd: >
              tar czf {{ backup_dir }}/pre-restore-backup-{{ ansible_date_time.date }}.tar.gz
              -C {{ xdc_data_dir | default('/root/XDC-Node') | dirname }}
              {{ xdc_data_dir | default('/root/XDC-Node') | basename }}
          
        - name: Remove current data
          ansible.builtin.file:
            path: "{{ xdc_data_dir | default('/root/XDC-Node') }}"
            state: absent
            
        - name: Restore from backup
          ansible.builtin.unarchive:
            src: "{{ restore_archive }}"
            dest: "{{ xdc_data_dir | default('/root/XDC-Node') | dirname }}"
            remote_src: yes
            
        - name: Clean up temporary files
          ansible.builtin.file:
            path: "{{ backup_dir }}/restore-temp.tar.gz"
            state: absent
          ignore_errors: yes
          
        - name: Start XDC node
          ansible.builtin.systemd:
            name: xdc-node
            state: started
            
        - name: Wait for node to be ready
          ansible.builtin.wait_for:
            port: "{{ rpc_port | default(8545) }}"
            timeout: 300
            
        - name: Verify restore
          ansible.builtin.uri:
            url: "http://localhost:{{ rpc_port | default(8545) }}"
            method: POST
            body_format: json
            body:
              jsonrpc: "2.0"
              method: eth_blockNumber
              params: []
              id: 1
            return_content: yes
          register: restore_verify
          
        - name: Display restore result
          ansible.builtin.debug:
            msg: |
              Restore completed successfully:
              File: {{ restore_file }}
              Current block: {{ restore_verify.json.result | default('unknown') }}
              
    # ========================================================================
    # List Backups
    # ========================================================================
    - name: List Backups
      tags: [list, never]
      block:
        - name: Find backup files
          ansible.builtin.find:
            paths: "{{ backup_dir }}/{{ inventory_hostname }}"
            patterns: "xdc-backup-*.tar.gz*"
          register: backup_files
          
        - name: Display backup list
          ansible.builtin.debug:
            msg: |
              Available backups for {{ inventory_hostname }}:
              {% for file in backup_files.files | sort(attribute='mtime', reverse=true) %}
              - {{ file.path | basename }} ({{ (file.size / 1024 / 1024) | round(2) }} MB, {{ file.mtime }})
              {% endfor %}
