[defaults]
# Inventory
inventory = inventory/hosts.yml
host_key_checking = False

# Execution
forks = 10
timeout = 30
remote_user = root
become = True
become_method = sudo
become_user = root

# Output
stdout_callback = yaml
bin_ansible_callbacks = True
callback_whitelist = profile_tasks, timer

# Gathering
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 86400

# Retry files
retry_files_enabled = False

# SSH
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
