apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "xdc-node.fullname" . }}
  labels:
    {{- include "xdc-node.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "xdc-node.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "xdc-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "xdc-node.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "xdc-node.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --datadir={{ .Values.xdc.dataDir }}
            - --port={{ .Values.xdc.p2pPort }}
            {{- if .Values.xdc.rpcEnabled }}
            - --rpc
            - --rpcaddr=0.0.0.0
            - --rpcport={{ .Values.xdc.rpcPort }}
            - --rpcapi={{ .Values.xdc.rpcApi }}
            - --rpccorsdomain={{ .Values.xdc.rpcCorsDomain | quote }}
            - --rpcvhosts={{ .Values.xdc.rpcVhosts | quote }}
            {{- end }}
            {{- if .Values.xdc.wsEnabled }}
            - --ws
            - --wsaddr=0.0.0.0
            - --wsport={{ .Values.xdc.wsPort }}
            - --wsapi={{ .Values.xdc.wsApi }}
            - --wsorigins={{ .Values.xdc.wsOrigins | quote }}
            {{- end }}
            {{- if .Values.xdc.metricsEnabled }}
            - --metrics
            - --metrics.addr=0.0.0.0
            - --metrics.port={{ .Values.xdc.metricsPort }}
            {{- end }}
            - --syncmode={{ .Values.xdc.syncMode }}
            - --cache={{ .Values.xdc.cacheSize }}
            - --maxpeers={{ .Values.xdc.maxPeers }}
            {{- if .Values.xdc.bootnodes }}
            - --bootnodes={{ .Values.xdc.bootnodes }}
            {{- end }}
            {{- range .Values.xdc.extraFlags }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: p2p-tcp
              containerPort: {{ .Values.xdc.p2pPort }}
              protocol: TCP
            - name: p2p-udp
              containerPort: {{ .Values.xdc.p2pPort }}
              protocol: UDP
            {{- if .Values.xdc.rpcEnabled }}
            - name: rpc
              containerPort: {{ .Values.xdc.rpcPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.xdc.wsEnabled }}
            - name: ws
              containerPort: {{ .Values.xdc.wsPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.xdc.metricsEnabled }}
            - name: metrics
              containerPort: {{ .Values.xdc.metricsPort }}
              protocol: TCP
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.xdc.dataDir }}
            - name: config
              mountPath: /etc/xdc
              readOnly: true
            {{- range .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- range .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "xdc-node.fullname" . }}
        {{- range .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
