apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: xdc-node
  namespace: xdc
  labels:
    app.kubernetes.io/name: xdc-node
    app.kubernetes.io/component: blockchain-node
spec:
  serviceName: xdc-node
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: xdc-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: xdc-node
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: xdc-node
          image: xinfin/xdc-node:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          args:
            - --datadir=/xdc-data
            - --port=30303
            - --rpc
            - --rpcaddr=0.0.0.0
            - --rpcport=8545
            - --rpcapi=eth,net,web3,txpool
            - --rpccorsdomain=*
            - --rpcvhosts=*
            - --ws
            - --wsaddr=0.0.0.0
            - --wsport=8546
            - --wsapi=eth,net,web3
            - --wsorigins=*
            - --metrics
            - --metrics.addr=0.0.0.0
            - --metrics.port=6060
            - --syncmode=snap
            - --cache=4096
            - --maxpeers=50
          ports:
            - name: p2p-tcp
              containerPort: 30303
              protocol: TCP
            - name: p2p-udp
              containerPort: 30303
              protocol: UDP
            - name: rpc
              containerPort: 8545
              protocol: TCP
            - name: ws
              containerPort: 8546
              protocol: TCP
            - name: metrics
              containerPort: 6060
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "4"
              memory: 16Gi
          livenessProbe:
            httpGet:
              path: /
              port: rpc
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: rpc
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /xdc-data
          envFrom:
            - configMapRef:
                name: xdc-node-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1000Gi
