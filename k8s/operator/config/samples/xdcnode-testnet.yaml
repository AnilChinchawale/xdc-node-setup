---
# Example: XDC Apothem Testnet Full Node
apiVersion: xdc.network/v1alpha1
kind: XDCNode
metadata:
  name: xdc-testnet-full
  namespace: xdc-nodes
  labels:
    app.kubernetes.io/name: xdc-node
    environment: testnet
spec:
  # Network Configuration
  network: testnet
  client: XDPoSChain
  nodeType: full

  # Image Configuration
  image:
    repository: xinfin/xdc-node
    tag: latest
    pullPolicy: IfNotPresent

  replicas: 1

  # RPC Configuration
  rpc:
    enabled: true
    port: 8545
    api:
      - eth
      - net
      - web3
      - txpool
      - debug
    corsDomain: "*"
    vhosts: "*"

  # WebSocket Configuration
  websocket:
    enabled: true
    port: 8546
    api:
      - eth
      - net
      - web3

  # P2P Configuration
  p2p:
    port: 30303
    maxPeers: 50

  # Metrics Configuration
  metrics:
    enabled: true
    port: 6060

  # Storage Configuration (smaller for testnet)
  storage:
    enabled: true
    size: "200Gi"
    storageClass: ""
    accessMode: ReadWriteOnce

  # Resource Requirements (lighter for testnet)
  resources:
    limits:
      cpu: "2"
      memory: "8Gi"
    requests:
      cpu: "1"
      memory: "4Gi"

  # Sync Configuration
  sync:
    mode: snap
    gcMode: full
    cacheSize: 2048

  # Service Configuration
  service:
    type: ClusterIP

  # Ingress Configuration
  ingress:
    enabled: false

---
# Example: XDC Apothem Testnet Validator Node
apiVersion: xdc.network/v1alpha1
kind: XDCNode
metadata:
  name: xdc-testnet-validator
  namespace: xdc-nodes
  labels:
    app.kubernetes.io/name: xdc-node
    environment: testnet
    role: validator
spec:
  network: testnet
  client: XDPoSChain
  nodeType: validator

  image:
    repository: xinfin/xdc-node
    tag: latest

  replicas: 1

  # RPC - restricted for validators
  rpc:
    enabled: true
    port: 8545
    api:
      - eth
      - net
      - web3
    corsDomain: ""  # Restricted
    vhosts: "localhost"

  websocket:
    enabled: false

  p2p:
    port: 30303
    maxPeers: 50

  metrics:
    enabled: true
    port: 6060

  storage:
    enabled: true
    size: "200Gi"

  resources:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

  # Validator Configuration
  validator:
    enabled: true
    address: "xdc0000000000000000000000000000000000000000"  # Replace with actual address
    keystoreSecret: testnet-validator-keystore
    passwordSecret: testnet-validator-password

  sync:
    mode: snap
    gcMode: full
    cacheSize: 2048

  service:
    type: ClusterIP

  # Ingress disabled for validators
  ingress:
    enabled: false

  # Anti-affinity to spread validators
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                xdc.network/node-type: validator
            topologyKey: kubernetes.io/hostname

---
# Example: XDC Apothem Testnet Development Node (Minimal Resources)
apiVersion: xdc.network/v1alpha1
kind: XDCNode
metadata:
  name: xdc-testnet-dev
  namespace: xdc-dev
  labels:
    app.kubernetes.io/name: xdc-node
    environment: development
spec:
  network: testnet
  client: XDPoSChain
  nodeType: full

  image:
    repository: xinfin/xdc-node
    tag: latest

  replicas: 1

  rpc:
    enabled: true
    port: 8545
    api:
      - eth
      - net
      - web3
      - txpool
      - debug
      - personal  # For development only!

  websocket:
    enabled: true
    port: 8546

  p2p:
    port: 30303
    maxPeers: 25

  metrics:
    enabled: true
    port: 6060

  # Minimal storage for development
  storage:
    enabled: true
    size: "100Gi"

  # Minimal resources for development
  resources:
    limits:
      cpu: "1"
      memory: "4Gi"
    requests:
      cpu: "500m"
      memory: "2Gi"

  sync:
    mode: snap
    gcMode: full
    cacheSize: 1024

  service:
    type: NodePort

  ingress:
    enabled: false
