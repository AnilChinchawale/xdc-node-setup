# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'XDC Dashboards'
    orgId: 1
    folder: 'XDC Node Setup'
    folderUid: 'xdc-node-setup'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
